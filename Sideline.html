<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PressBox | Architect Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden bg-slate-950 text-slate-200">
    
    <div id="specter-hud" class="fixed inset-0 border-[4px] border-purple-500/20 pointer-events-none z-[200] hidden">
        <div class="absolute top-4 left-1/2 -translate-x-1/2 bg-purple-600 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.3em] animate-pulse shadow-[0_0_20px_rgba(147,51,234,0.5)]">
            Specter Link Active: <span id="target-id" class="text-white">NULL_PTR</span>
        </div>
        <div class="absolute top-0 left-0 w-16 h-16 border-t-2 border-l-2 border-purple-500/40"></div>
        <div class="absolute bottom-0 right-0 w-16 h-16 border-b-2 border-r-2 border-purple-500/40"></div>
    </div>

    <div id="auth-overlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-xl p-4">
        <div class="max-w-md w-full glass-card rounded-[2.5rem] p-10 border border-slate-800 text-center">
            <h1 id="auth-logo" class="text-4xl font-black italic tracking-tighter mb-6 text-white cursor-pointer select-none">PRESS<span class="text-green-500">BOX</span></h1>
            <form id="registrationForm" class="space-y-4 text-left">
                <input type="text" id="usernameInput" required placeholder="Display Name" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-white outline-none focus:border-green-500 transition">
                
                <div id="admin-gate" class="hidden">
                    <input type="password" id="adminCodeInput" placeholder="Enter BOSS2026 Key" class="w-full bg-slate-900 border border-yellow-500/50 rounded-2xl px-5 py-4 text-white outline-none">
                </div>

                <select id="roleInput" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-slate-300 outline-none">
                    <option value="Photographer">Photographer</option>
                    <option value="Videographer">Videographer</option>
                    <option value="Tester">Tester / QA</option>
                    <option id="admin-option" value="ADMIN" class="hidden text-yellow-500 font-bold">ADMIN / OWNER</option>
                </select>
                <button type="submit" class="w-full py-5 bg-green-500 text-black font-black uppercase rounded-2xl tracking-widest hover:bg-green-400 transition-all">Initialize System</button>
            </form>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col">
            <div class="p-8 flex items-center justify-between">
                <h1 class="text-2xl font-black italic tracking-tighter">PRESS<span class="text-green-500">BOX</span></h1>
                <button id="add-channel-btn" onclick="admin.createNewChannel()" class="hidden text-slate-500 hover:text-green-500 transition">
                    <i class="fa-solid fa-plus-circle"></i>
                </button>
            </div>
            <nav id="sidebar-nav" class="flex-1 px-5 space-y-6 overflow-y-auto"></nav>
            
            <div id="trash-zone" class="mx-5 mb-4 border-2 border-dashed border-slate-800 rounded-2xl p-4 text-center text-[10px] font-black uppercase tracking-widest text-slate-600 hidden">
                <i class="fa-solid fa-trash-can mb-1 block text-lg"></i> Trash Zone
            </div>

            <div class="p-5 border-t border-slate-800 bg-slate-900/50 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div id="user-avatar" class="w-10 h-10 rounded-2xl flex items-center justify-center font-black text-xs uppercase">?</div>
                    <span id="display-name" class="text-xs font-black uppercase tracking-wider">User</span>
                </div>
                <button onclick="ui.toggleSettings()" class="text-slate-600 hover:text-green-500 transition">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="px-8 py-5 border-b border-slate-900 flex justify-between items-center bg-slate-950/50 backdrop-blur-md">
                <h2 id="channel-title" class="text-xl font-black italic uppercase tracking-tighter">#general</h2>
                <div class="flex gap-6">
                    <button onclick="ui.switchTab('chat')" id="tab-chat" class="tab-btn active">Feed</button>
                    <button onclick="ui.switchTab('media')" id="tab-media" class="tab-btn">Gallery <span id="m-count" class="opacity-50">0</span></button>
                    <button onclick="ui.switchTab('members')" id="tab-members" class="tab-btn">Users <span id="u-count" class="opacity-50">0</span></button>
                    <button onclick="ui.switchTab('logs')" id="tab-logs" class="tab-btn hidden text-yellow-500">System Logs</button>
                </div>
            </header>

            <div id="chat-view" class="flex-1 flex flex-col overflow-hidden">
                <div id="chat-feed" class="flex-1 overflow-y-auto px-8 py-8 space-y-6 text-sm"></div>
                <form id="message-form" class="p-6 bg-slate-900/50 border-t border-slate-800 flex gap-4">
                    <input type="text" id="msg-input" placeholder="Transmit data..." class="flex-1 bg-transparent text-white outline-none">
                    <button type="submit" class="w-12 h-12 bg-green-500 text-black rounded-xl hover:scale-105 transition"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </div>

            <div id="media-view" class="hidden flex-1 overflow-y-auto p-10">
                <div id="media-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
            
            <div id="members-view" class="hidden flex-1 overflow-y-auto p-10">
                <div id="members-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>

            <div id="logs-view" class="hidden flex-1 overflow-y-auto p-10">
                <div class="max-w-4xl mx-auto space-y-2" id="logs-feed"></div>
            </div>
            
            <div id="voice-view" class="hidden flex-1 flex flex-col items-center justify-center">
                <div id="voice-indicator" class="voice-pulse w-32 h-32 rounded-full flex items-center justify-center mb-10 border-4 border-slate-900 transition-transform duration-75">
                    <i id="voice-main-icon" class="fa-solid fa-microphone text-4xl text-green-500"></i>
                </div>
                
                <div class="flex items-center gap-6 bg-slate-900 p-4 rounded-2xl border border-slate-800 shadow-2xl">
                    <div class="flex items-center gap-3">
                        <button id="mute-btn" onclick="ui.toggleVoice('mute')" class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white transition">
                            <i class="fa-solid fa-microphone-slash"></i>
                        </button>
                        <div class="flex flex-col gap-1.5">
                            <select id="mic-select" onchange="ui.updateHardware('input')" class="bg-transparent text-[10px] text-slate-400 uppercase font-black w-28 outline-none cursor-pointer hover:text-white transition"></select>
                            <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                                <div id="mic-level-bar" class="h-full bg-green-500 w-0 transition-all duration-75"></div>
                            </div>
                        </div>
                    </div>

                    <div class="h-8 w-[1px] bg-slate-800"></div>

                    <div class="flex items-center gap-3">
                        <button id="deafen-btn" onclick="ui.toggleVoice('deafen')" class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white transition">
                            <i class="fa-solid fa-volume-xmark"></i>
                        </button>
                        <select id="speaker-select" onchange="ui.updateHardware('output')" class="bg-transparent text-[10px] text-slate-400 uppercase font-black w-28 outline-none cursor-pointer hover:text-white transition"></select>
                    </div>
                </div>
                <p id="voice-status" class="mt-6 text-[10px] font-black uppercase tracking-[0.3em] text-slate-600">Secure Line Active</p>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[120] bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-6">
        <div class="max-w-lg w-full bg-slate-950 border border-slate-800 rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-slate-900 flex justify-between items-center">
                <h2 class="text-xl font-black italic uppercase tracking-tighter">System <span class="text-green-500">Settings</span></h2>
                <button onclick="ui.toggleSettings()" class="text-slate-500 hover:text-white transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="p-8 space-y-8 overflow-y-auto max-h-[70vh]">
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Interface Theme</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button data-theme="classic" onclick="ui.setTheme('classic')" class="theme-btn py-4 bg-slate-900 border border-slate-800 rounded-2xl text-[11px] font-black uppercase transition">Classic Onyx</button>
                        <button data-theme="architect" onclick="ui.setTheme('architect')" class="theme-btn py-4 bg-slate-900 border border-slate-800 rounded-2xl text-[11px] font-black uppercase transition">Architect Green</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Identity reset</label>
                    <button onclick="main.logout()" class="w-full py-4 bg-red-500/10 border border-red-500/20 text-red-500 rounded-2xl text-[11px] font-black uppercase hover:bg-red-500 hover:text-white transition">Wipe Session & Logout</button>
                </div>

                <div id="admin-controls" class="space-y-6 pt-8 border-t border-slate-800 hidden">
                    <label class="text-[10px] font-black uppercase tracking-widest text-yellow-500">Architect Command Deck</label>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="admin.toggleGhostMode()" id="ghost-btn" class="py-3 bg-slate-900 border border-slate-800 rounded-xl text-[10px] font-black uppercase hover:border-purple-500 transition">
                            <i class="fa-solid fa-ghost mr-2"></i> Ghost Mode: OFF
                        </button>

                        <button onclick="admin.purgeAllSessions()" class="py-3 bg-slate-900 border border-red-900/30 rounded-xl text-[10px] font-black uppercase text-red-400 hover:bg-red-950 transition">
                            <i class="fa-solid fa-radiation mr-2"></i> Purge All
                        </button>
                    </div>

                    <div class="space-y-2">
                        <div class="flex items-center justify-between">
                            <label class="text-[9px] font-bold text-slate-500 uppercase">Neural Command Line</label>
                            <span class="text-[8px] text-slate-600 font-mono">SYS.ROOT.EXEC</span>
                        </div>
                        <input type="text" id="admin-cli" placeholder="Enter command (e.g., /promote username admin)..." 
                               class="w-full bg-black border border-slate-800 rounded-xl px-4 py-3 text-xs font-mono text-green-500 outline-none focus:border-green-500/50">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[9px] font-bold text-slate-500 uppercase">IP Sentinel (Recent Access)</label>
                        <div id="ip-sentinel-list" class="bg-black/50 rounded-xl p-3 h-24 overflow-y-auto font-mono text-[9px] text-slate-400 space-y-1 border border-slate-900">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="state.js"></script>
    <script src="ui.js"></script>
    <script src="chat.js"></script>
    <script src="admin.js"></script>
    <script src="main.js"></script>
</body>
</html>
